name: Deploy to 小兔云

on:
  push:
    branches: [main]
  workflow_dispatch:  # 允许手动触发

jobs:
  deploy:
    name: 部署到小兔云服务器
    runs-on: ubuntu-latest

    steps:
      - name: 执行远程部署
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            echo "=== 开始部署 Sunday OS ==="

            # 进入项目目录
            cd /opt/sundayos

            # 拉取最新代码
            echo ">>> 拉取最新代码..."
            git pull origin main

            # 激活虚拟环境并更新依赖
            echo ">>> 更新依赖..."
            source .venv/bin/activate
            pip install -q -r backend/requirements.txt

            # 重启服务
            echo ">>> 重启服务..."
            systemctl restart sunday.service

            # 等待服务启动
            sleep 3

            # 检查服务状态
            echo ">>> 检查服务状态..."
            systemctl status sunday.service --no-pager || true

            # 验证健康端点
            echo ">>> 验证健康端点..."
            curl -s http://localhost:8005/health | python3 -m json.tool || echo "健康检查失败"

            echo "=== 部署完成 ==="

      - name: 通知部署结果
        if: always()
        run: |
          if [ ${{ job.status }} == 'success' ]; then
            echo "✅ 部署成功！"
          else
            echo "❌ 部署失败，请检查日志"
          fi
